# cbindgen configuration for truck-bridge.
# Generates a pure C header (no C++) at include/truck_bridge.h.

language = "c"

# Stable include guard + pragma once for consumers.
include_guard = "TRUCK_BRIDGE_H"
pragma_once = true

# Emit a banner describing what this header is and the ABI-version contract.
header = """\
// Auto-generated by cbindgen from truck-bridge Rust sources. DO NOT EDIT.
//
// truck-bridge: C ABI export of the truck geometric kernel.
//
// Memory ownership rules (IMPORTANT):
//   - Opaque handles (TruckPolygonMesh, TruckError, ...) are allocated by the
//     library and MUST be released by the matching *_free function. Never use
//     free()/delete on them — they live in the Rust allocator.
//   - Returned arrays/strings (TruckF64Array, TruckU8Array, TruckStr) are
//     {ptr, len} views into Rust-allocated memory; free them with the matching
//     truck_*array_free / truck_str_free. They are NOT NUL-terminated.
//
// All functions are safe to call with NULL opaque pointers (they return a
// benign failure); passing a freed pointer twice is also tolerated (idempotent
// *_free)."""

# Auto-generated includes a trailer with the ABI version note.
trailer = "// End of truck-bridge C header."

# We export only `pub extern "C"` items; cbindgen should scan this crate only.
[parse]
parse_deps = false

# Use the modern `extern "C"` style without a fixed prefix.
[fn]
prefix = ""

# Render pointer types naturally. `must_use` adds a compiler hint attribute.
must_use = ""

[struct]

[defines]
# Map a few Rust target_* cfgs so cbindgen does not choke on platform cfgs.
"target_pointer_width = 32" = ""
"target_pointer_width = 64" = ""
